<svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="#000000"/>

  <!-- ── Orbit ring ── -->
  <ellipse cx="248" cy="215" rx="178" ry="56"
    stroke="url(#ring1)" stroke-width="11" fill="none"
    transform="rotate(-22 248 215)"/>
  <ellipse cx="248" cy="215" rx="178" ry="56"
    stroke="url(#ring2)" stroke-width="5" fill="none" opacity="0.4"
    transform="rotate(-22 248 215)"/>

  <!-- ── A letter (3D gold serif) ── -->
  <!-- Shadow layer -->
  <text x="46" y="285" font-family="Georgia,serif" font-size="248" font-weight="900"
    fill="url(#shadowA)" letter-spacing="-8" opacity="0.6">A</text>
  <!-- Main A -->
  <text x="42" y="280" font-family="Georgia,serif" font-size="248" font-weight="900"
    fill="url(#goldA)" letter-spacing="-8">A</text>
  <!-- Highlight A -->
  <text x="42" y="280" font-family="Georgia,serif" font-size="248" font-weight="900"
    fill="url(#highlightA)" letter-spacing="-8" opacity="0.35">A</text>

  <!-- ── i letter (silver chrome serif) ── -->
  <text x="264" y="280" font-family="Georgia,serif" font-size="248" font-weight="900"
    fill="url(#silveri)" letter-spacing="0">i</text>
  <!-- i highlight -->
  <text x="264" y="280" font-family="Georgia,serif" font-size="248" font-weight="900"
    fill="url(#highlightI)" letter-spacing="0" opacity="0.3">i</text>

  <!-- ── Gold orb / dot on i ── -->
  <circle cx="307" cy="44" r="24" fill="url(#orb)"/>
  <circle cx="303" cy="40" r="10" fill="url(#orbHighlight)" opacity="0.7"/>

  <!-- ── Star lens flare ── -->
  <g transform="translate(346,72)">
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#FFE566" stroke-width="2.5" opacity="0.9"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#FFE566" stroke-width="2.5" opacity="0.9"/>
    <line x1="-14" y1="-14" x2="14" y2="14" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
    <line x1="14" y1="-14" x2="-14" y2="14" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.9"/>
  </g>

  <!-- ── AI CONNECT text ── -->
  <text x="250" y="345" font-family="Georgia,serif" font-size="46" font-weight="700"
    fill="url(#textGold)" text-anchor="middle" letter-spacing="6">AI CONNECT</text>

  <!-- ── Divider lines + DAILY ── -->
  <line x1="68" y1="362" x2="165" y2="362" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="380" font-family="Georgia,serif" font-size="28" font-weight="500"
    fill="url(#textGoldDim)" text-anchor="middle" letter-spacing="10">DAILY</text>
  <line x1="335" y1="362" x2="432" y2="362" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>

  <!-- ── Tagline pill ── -->
  <rect x="38" y="398" width="424" height="52" rx="26" fill="none"
    stroke="url(#pillBorder)" stroke-width="1.5"/>
  <text x="250" y="418" font-family="Georgia,serif" font-size="13" font-weight="400"
    fill="#D4AF37" text-anchor="middle" letter-spacing="1">CẬP NHẬT AI MỚI NHẤT</text>
  <text x="250" y="438" font-family="Georgia,serif" font-size="12" font-weight="400"
    fill="rgba(212,175,55,0.75)" text-anchor="middle" letter-spacing="1">KẾT NỐI – ỨNG DỤNG – DẪN ĐẦU</text>

  <defs>
    <!-- A letter gradient (gold 3D) -->
    <linearGradient id="goldA" x1="42" y1="50" x2="240" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="20%" stop-color="#FFD700"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#7A5800"/>
    </linearGradient>
    <linearGradient id="shadowA" x1="42" y1="50" x2="240" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5A3E00"/>
      <stop offset="100%" stop-color="#2A1A00"/>
    </linearGradient>
    <linearGradient id="highlightA" x1="60" y1="60" x2="160" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFDE0"/>
      <stop offset="60%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- i letter gradient (silver chrome) -->
    <linearGradient id="silveri" x1="264" y1="50" x2="340" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#E8E8E8"/>
      <stop offset="50%" stop-color="#B0B0B0"/>
      <stop offset="75%" stop-color="#D0D0D0"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <linearGradient id="highlightI" x1="270" y1="60" x2="310" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Orbit ring gradients -->
    <linearGradient id="ring1" x1="70" y1="159" x2="426" y2="271" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6B4A00"/>
      <stop offset="25%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="75%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#6B4A00"/>
    </linearGradient>
    <linearGradient id="ring2" x1="70" y1="159" x2="426" y2="271" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#FFF0A0"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Orb gradients -->
    <radialGradient id="orb" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFF8C0"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#8B6000"/>
    </radialGradient>
    <radialGradient id="orbHighlight" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Text gradients -->
    <linearGradient id="textGold" x1="68" y1="310" x2="432" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="textGoldDim" x1="68" y1="360" x2="432" y2="385" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="pillBorder" x1="38" y1="398" x2="462" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(212,175,55,0.2)"/>
      <stop offset="50%" stop-color="rgba(212,175,55,0.6)"/>
      <stop offset="100%" stop-color="rgba(212,175,55,0.2)"/>
    </linearGradient>
  </defs>
</svg>
